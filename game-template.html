<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Next Stop — Guess the NYC Subway Station</title>
<style>
  :root {
    --bg: #121212;
    --panel: #1e1e1e;
    --line: #333;
    --text: #f5f5f5;
    --muted: #999;
    --good: #2fbf71;
    --bad: #555;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: Helvetica, Arial, sans-serif;
    display: flex; justify-content: center; min-height: 100vh;
  }
  #app { width: 100%; max-width: 480px; padding: 16px 14px 60px; }
  header { text-align: center; border-bottom: 1px solid var(--line); padding-bottom: 12px; margin-bottom: 14px; }
  h1 { font-size: 26px; letter-spacing: 1px; font-weight: 800; }
  h1 .dot { display:inline-block; width: 20px; height: 20px; border-radius: 50%; vertical-align: -2px; }
  .sub { color: var(--muted); font-size: 13px; margin-top: 4px; }
  .modeTag { display:inline-block; margin-top:6px; font-size:11px; letter-spacing:1px; color:#000;
    background:#FCCC0A; border-radius:10px; padding:2px 10px; font-weight:700; }

  .mystery { background: var(--panel); border: 1px solid var(--line); border-radius: 12px;
    padding: 14px; text-align: center; margin-bottom: 14px; }
  .mystery .label { color: var(--muted); font-size: 12px; letter-spacing: 1.5px; margin-bottom: 10px; }
  .bullets { display: flex; flex-wrap: wrap; gap: 7px; justify-content: center; }
  .bullet { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center;
    justify-content: center; font-weight: 800; font-size: 17px; color: #fff; }
  .bullet.sm { width: 20px; height: 20px; font-size: 11px; }
  .bullet.dark { color: #000; }

  .board { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
  .row { background: var(--panel); border: 1px solid var(--line); border-radius: 8px;
    min-height: 46px; padding: 6px 10px; display: flex; align-items: center; gap: 8px; }
  .row.empty { justify-content: center; color: #444; font-size: 13px; }
  .row.win { border-color: var(--good); background: #14301f; }
  .row .name { flex: 1; font-size: 14px; font-weight: 600; min-width: 0; }
  .row .name .boro { color: var(--muted); font-weight: 400; font-size: 11px; display: block; }
  .chips { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .chip { text-align: center; font-size: 12px; }
  .chip .v { font-weight: 800; font-size: 14px; }
  .chip .k { color: var(--muted); font-size: 9px; letter-spacing: .5px; }
  .shared { display:flex; gap:3px; }
  .arrow { font-size: 18px; }
  .ok { color: var(--good); } .no { color: var(--bad); }

  .inputWrap { position: relative; }
  #guessInput { width: 100%; padding: 13px 12px; font-size: 16px; border-radius: 8px;
    border: 2px solid var(--line); background: var(--panel); color: var(--text); outline: none; }
  #guessInput:focus { border-color: #FCCC0A; }
  #suggestions { position: absolute; bottom: 100%; left: 0; right: 0; margin-bottom: 4px;
    background: #252525; border: 1px solid var(--line); border-radius: 8px; overflow: hidden;
    max-height: 240px; overflow-y: auto; display: none; z-index: 5; }
  .sug { padding: 10px 12px; cursor: pointer; display: flex; align-items: center; gap: 8px;
    font-size: 14px; border-bottom: 1px solid #2e2e2e; }
  .sug:hover, .sug.active { background: #333; }
  .sug .sb { color: var(--muted); font-size: 11px; margin-left: auto; flex-shrink:0; }
  .hint { color: var(--muted); font-size: 12px; text-align: center; margin-top: 8px; }

  .result { display: none; background: var(--panel); border: 1px solid var(--line);
    border-radius: 12px; padding: 18px; text-align: center; margin-top: 14px; }
  .result h2 { font-size: 18px; margin-bottom: 6px; }
  .result .answer { font-size: 15px; color: #FCCC0A; font-weight: 700; margin-bottom: 12px; }
  .btn { background: #FCCC0A; color: #000; border: none; border-radius: 8px; padding: 10px 18px;
    font-size: 14px; font-weight: 700; cursor: pointer; margin: 4px; }
  .btn.alt { background: #333; color: var(--text); }
  .legend { color:#666; font-size:11px; text-align:center; margin-top:10px; line-height:1.5; }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>NEXT ST<span class="dot" style="background:#EE352E"></span>P</h1>
    <div class="sub">Guess the NYC subway station from the trains that stop there</div>
    <div class="modeTag" id="modeTag">DAILY</div>
  </header>

  <div class="mystery">
    <div class="label">TRAINS AT THE MYSTERY STATION</div>
    <div class="bullets" id="mysteryBullets"></div>
  </div>

  <div class="board" id="board"></div>

  <div class="inputWrap">
    <div id="suggestions"></div>
    <input id="guessInput" type="text" placeholder="Type a station name…" autocomplete="off">
  </div>
  <div class="hint" id="hintLine">6 guesses. After each guess: shared lines, borough, distance &amp; direction to the answer.</div>

  <div class="result" id="result">
    <h2 id="resultTitle"></h2>
    <div class="answer" id="resultAnswer"></div>
    <button class="btn" id="shareBtn">Share result</button>
    <button class="btn alt" id="practiceBtn">Play a random station</button>
  </div>

  <div class="legend">Unofficial fan-made prototype · Station data: MTA open data</div>
</div>

<script>
const STATIONS = __STATIONS_JSON__;

const COLORS = {
  A:'#0039A6', C:'#0039A6', E:'#0039A6',
  B:'#FF6319', D:'#FF6319', F:'#FF6319', M:'#FF6319',
  G:'#6CBE45', J:'#996633', Z:'#996633', L:'#A7A9AC',
  N:'#FCCC0A', Q:'#FCCC0A', R:'#FCCC0A', W:'#FCCC0A',
  S:'#808183', '1':'#EE352E','2':'#EE352E','3':'#EE352E',
  '4':'#00933C','5':'#00933C','6':'#00933C','7':'#B933AD'
};
const DARK_TEXT = new Set(['N','Q','R','W']);
const BORO = { M:'Manhattan', Bk:'Brooklyn', Q:'Queens', Bx:'Bronx' };
const MAX_GUESSES = 6;

// ---------- helpers ----------
function norm(s){ return s.toLowerCase().replace(/[^a-z0-9 ]/g,'').replace(/\s+/g,' ').trim(); }
function mulberry32(a){ return function(){ a|=0; a=a+0x6D2B79F5|0; let t=Math.imul(a^a>>>15,1|a);
  t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }
function haversineMi(a,b){
  const R=3958.8, toR=x=>x*Math.PI/180;
  const dLat=toR(b.lat-a.lat), dLon=toR(b.lon-a.lon);
  const h=Math.sin(dLat/2)**2+Math.cos(toR(a.lat))*Math.cos(toR(b.lat))*Math.sin(dLon/2)**2;
  return 2*R*Math.asin(Math.sqrt(h));
}
function bearingArrow(from,to){
  const toR=x=>x*Math.PI/180;
  const dLon=toR(to.lon-from.lon);
  const y=Math.sin(dLon)*Math.cos(toR(to.lat));
  const x=Math.cos(toR(from.lat))*Math.sin(toR(to.lat))-Math.sin(toR(from.lat))*Math.cos(toR(to.lat))*Math.cos(dLon);
  const brng=(Math.atan2(y,x)*180/Math.PI+360)%360;
  const arrows=['⬆️','↗️','➡️','↘️','⬇️','↙️','⬅️','↖️'];
  return arrows[Math.round(brng/45)%8];
}
function bulletEl(route, small){
  const d=document.createElement('div');
  d.className='bullet'+(small?' sm':'')+(DARK_TEXT.has(route)?' dark':'');
  d.style.background=COLORS[route]||'#666';
  d.textContent=route;
  return d;
}

// ---------- game state ----------
let answer=null, guesses=[], over=false, mode='daily', dailyNum=0;

function dailyPool(){ return STATIONS.filter(s=>s.routes.length>=2); }

function pickDaily(){
  const now=new Date();
  const epochDay=Math.floor(Date.UTC(now.getFullYear(),now.getMonth(),now.getDate())/86400000);
  dailyNum=epochDay-Math.floor(Date.UTC(2026,5,12)/86400000)+1; // puzzle #1 = Jun 12 2026
  const pool=dailyPool();
  const rng=mulberry32(epochDay*2654435761);
  return pool[Math.floor(rng()*pool.length)];
}
function pickRandom(){
  return STATIONS[Math.floor(Math.random()*STATIONS.length)];
}

function startGame(m){
  mode=m; guesses=[]; over=false;
  answer = m==='daily' ? pickDaily() : pickRandom();
  document.getElementById('modeTag').textContent = m==='daily' ? ('DAILY #'+dailyNum) : 'PRACTICE';
  document.getElementById('result').style.display='none';
  document.getElementById('guessInput').value='';
  document.getElementById('guessInput').disabled=false;
  renderMystery(); renderBoard();
}

function renderMystery(){
  const c=document.getElementById('mysteryBullets'); c.innerHTML='';
  answer.routes.forEach(r=>c.appendChild(bulletEl(r,false)));
}

function renderBoard(){
  const b=document.getElementById('board'); b.innerHTML='';
  for(let i=0;i<MAX_GUESSES;i++){
    const row=document.createElement('div');
    if(i<guesses.length){
      const g=guesses[i];
      row.className='row'+(g.win?' win':'');
      const name=document.createElement('div'); name.className='name';
      name.innerHTML=g.station.name+'<span class="boro">'+BORO[g.station.boro]+'</span>';
      row.appendChild(name);
      const chips=document.createElement('div'); chips.className='chips';
      // shared lines
      const sh=document.createElement('div'); sh.className='chip';
      const shRow=document.createElement('div'); shRow.className='shared';
      if(g.shared.length===0){ shRow.innerHTML='<span class="no">—</span>'; }
      else g.shared.forEach(r=>shRow.appendChild(bulletEl(r,true)));
      sh.appendChild(shRow);
      const shK=document.createElement('div'); shK.className='k'; shK.textContent='SHARED';
      sh.appendChild(shK); chips.appendChild(sh);
      // borough
      const bo=document.createElement('div'); bo.className='chip';
      bo.innerHTML='<div class="v '+(g.boroMatch?'ok':'no')+'">'+(g.boroMatch?'✓':'✗')+'</div><div class="k">BORO</div>';
      chips.appendChild(bo);
      if(!g.win){
        const di=document.createElement('div'); di.className='chip';
        di.innerHTML='<div class="v">'+g.dist.toFixed(1)+'</div><div class="k">MILES</div>';
        chips.appendChild(di);
        const ar=document.createElement('div'); ar.className='chip arrow';
        ar.textContent=g.arrow; chips.appendChild(ar);
      } else {
        const di=document.createElement('div'); di.className='chip';
        di.innerHTML='<div class="v ok">🎉</div>';
        chips.appendChild(di);
      }
      row.appendChild(chips);
    } else {
      row.className='row empty';
      row.textContent='Guess '+(i+1)+' of '+MAX_GUESSES;
    }
    b.appendChild(row);
  }
}

function submitGuess(station){
  if(over) return;
  if(guesses.some(g=>g.station.id===station.id)) return;
  const win = station.id===answer.id;
  guesses.push({
    station, win,
    shared: station.routes.filter(r=>answer.routes.includes(r)),
    boroMatch: station.boro===answer.boro,
    dist: haversineMi(station,answer),
    arrow: bearingArrow(station,answer)
  });
  document.getElementById('guessInput').value='';
  hideSuggestions();
  renderBoard();
  if(win||guesses.length>=MAX_GUESSES) endGame(win);
}

function endGame(win){
  over=true;
  document.getElementById('guessInput').disabled=true;
  const r=document.getElementById('result');
  document.getElementById('resultTitle').textContent = win
    ? 'You got it in '+guesses.length+(guesses.length===1?' guess!':' guesses!')
    : 'Next time!';
  document.getElementById('resultAnswer').textContent = answer.name+' ('+BORO[answer.boro]+')';
  r.style.display='block';
  r.scrollIntoView({behavior:'smooth'});
}

document.getElementById('shareBtn').addEventListener('click',()=>{
  const head = mode==='daily' ? 'Next Stop #'+dailyNum : 'Next Stop (practice)';
  const lines=guesses.map(g=>{
    if(g.win) return '🟩🟩🟩';
    const d=g.dist;
    return (d<1?'🟨':d<5?'🟧':'⬛')+(g.boroMatch?'🟩':'⬛')+g.arrow;
  });
  const won=guesses.length>0&&guesses[guesses.length-1].win;
  const txt=head+' '+(won?guesses.length:'X')+'/'+MAX_GUESSES+'\n'+lines.join('\n');
  const done=()=>{ const b=document.getElementById('shareBtn'); b.textContent='Copied!';
    setTimeout(()=>b.textContent='Share result',1500); };
  if(navigator.clipboard&&navigator.clipboard.writeText) navigator.clipboard.writeText(txt).then(done,done);
  else { prompt('Copy your result:',txt); }
});
document.getElementById('practiceBtn').addEventListener('click',()=>startGame('practice'));

// ---------- autocomplete ----------
const input=document.getElementById('guessInput');
const sugBox=document.getElementById('suggestions');
let activeIdx=-1, current=[];

function hideSuggestions(){ sugBox.style.display='none'; activeIdx=-1; current=[]; }

function showSuggestions(){
  const q=norm(input.value);
  if(!q){ hideSuggestions(); return; }
  current=STATIONS.filter(s=>!guesses.some(g=>g.station.id===s.id))
    .filter(s=>s.search.some(n=>n.includes(q)))
    .slice(0,8);
  if(current.length===0){ hideSuggestions(); return; }
  sugBox.innerHTML='';
  current.forEach((s,i)=>{
    const d=document.createElement('div'); d.className='sug'+(i===activeIdx?' active':'');
    const nm=document.createElement('span'); nm.textContent=s.name; d.appendChild(nm);
    const sb=document.createElement('span'); sb.className='sb'; sb.textContent=BORO[s.boro]; d.appendChild(sb);
    d.addEventListener('mousedown',e=>{ e.preventDefault(); submitGuess(s); });
    sugBox.appendChild(d);
  });
  sugBox.style.display='block';
}
input.addEventListener('input',()=>{ activeIdx=-1; showSuggestions(); });
input.addEventListener('blur',()=>setTimeout(hideSuggestions,120));
input.addEventListener('keydown',e=>{
  if(sugBox.style.display!=='block') return;
  if(e.key==='ArrowDown'){ e.preventDefault(); activeIdx=Math.min(activeIdx+1,current.length-1); showSuggestions(); }
  else if(e.key==='ArrowUp'){ e.preventDefault(); activeIdx=Math.max(activeIdx-1,0); showSuggestions(); }
  else if(e.key==='Enter'){
    e.preventDefault();
    const pick = activeIdx>=0 ? current[activeIdx]
      : current.find(s=>norm(s.name)===norm(input.value)) || current[0];
    if(pick) submitGuess(pick);
  } else if(e.key==='Escape'){ hideSuggestions(); }
});

startGame('daily');
</script>
</body>
</html>
